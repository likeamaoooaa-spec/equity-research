<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Equity Research</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="tree-data.js"></script>
<style>
  /* ========================================================
     Buy-Side Equity Research — 温润排版风格
     ======================================================== */
  :root {
    --bg-main: #fdfcf8;
    --bg-sidebar: #f5f4ef;
    --border: #e6e4df;
    --text-main: #242220;
    --text-muted: #73716d;
    --accent: #da7756;
    --accent-bg: rgba(218, 119, 86, 0.06);
    --accent-hover: rgba(218, 119, 86, 0.12);
    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-serif: "Charter", "Bitstream Charter", "Sitka Text", Cambria, Georgia, "Noto Serif SC", "Songti SC", serif;
    --sidebar-w: 300px;
    --topbar-h: 56px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--font-ui);
    background: var(--bg-main); color: var(--text-main);
    display: flex; height: 100vh; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── 侧边栏 (PC端常驻) ── */
  aside {
    width: var(--sidebar-w); min-width: var(--sidebar-w); z-index: 100;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  aside .sidebar-inner { display:flex; flex-direction:column; overflow:hidden; flex:1; }
  aside header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  aside header h1 {
    font-family: var(--font-serif);
    font-size: 20px; font-weight: 600;
    margin-bottom: 4px; color: var(--text-main);
  }
  aside header p { font-size: 12px; color: var(--text-muted); }
  aside nav { flex:1; overflow-y:auto; padding: 12px 0; -webkit-overflow-scrolling: touch; }

  /* ── 目录树 ── */
  .tree-toggle {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 10px 20px; font-size: 12.5px; font-weight: 500;
    color: var(--text-muted); cursor: pointer; user-select: none;
    border: none; background: none; text-align: left;
    letter-spacing: .3px; transition: color .15s;
  }
  .tree-toggle:hover { color: var(--text-main); }
  .tree-toggle .arrow {
    display: inline-block; font-size: 9px; width: 12px;
    transition: transform .2s ease; flex-shrink: 0; color: #a3a19d;
  }
  .tree-toggle.collapsed .arrow { transform: rotate(-90deg); }
  .tree-children { overflow: hidden; max-height: 0; }
  .tree-children.expanded { max-height: 9999px; }

  .file-link {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; margin: 2px 16px;
    font-size: 13.5px; color: var(--text-main); text-decoration: none;
    border-radius: 6px; cursor: pointer; transition: all .15s ease;
    line-height: 1.4;
  }
  .file-link:hover { background: rgba(0,0,0,0.04); }
  .file-link.active {
    background: var(--accent-bg); color: var(--accent);
    font-weight: 500;
  }
  .file-link .title-part { flex: 1; }
  .file-link .ticker-badge {
    font-size: 10px; font-weight: 600; letter-spacing: .5px;
    color: var(--text-muted); background: rgba(0,0,0,0.06);
    padding: 1px 6px; border-radius: 4px; flex-shrink: 0;
  }

  /* ── 移动端遮罩 ── */
  .sidebar-overlay {
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(36, 34, 32, 0.4); z-index: 99; display: none;
    backdrop-filter: blur(2px); transition: opacity 0.3s;
  }
  .sidebar-overlay.show { display: block; }

  /* ── 移动端顶栏 ── */
  .topbar {
    display: none; height: var(--topbar-h); min-height: var(--topbar-h);
    background: var(--bg-main); border-bottom: 1px solid var(--border);
    align-items: center; padding: 0 16px; gap: 16px; flex-shrink: 0;
    position: sticky; top: 0; z-index: 90;
  }
  .topbar .hamburger {
    background: none; border: none; cursor: pointer; padding: 4px;
    display: flex; flex-direction: column; gap: 4px; width: 24px;
  }
  .topbar .hamburger span {
    display: block; height: 2px; background: var(--text-main);
    border-radius: 2px; transition: .2s;
  }
  .topbar .title { font-family: var(--font-serif); font-size: 17px; font-weight: 600; flex: 1; color: var(--text-main); }

  /* ── 主内容区 ── */
  main {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column;
    -webkit-overflow-scrolling: touch; min-width: 0;
  }
  main .toolbar {
    padding: 16px 48px; position: sticky; top: 0; z-index: 10;
    background: rgba(253, 252, 248, 0.95); backdrop-filter: blur(8px);
    display: flex; align-items: center; gap: 16px; flex-shrink: 0;
  }
  .breadcrumb { font-size: 13px; color: var(--text-muted); }

  .content {
    padding: 20px 48px 80px; max-width: 740px; flex:1; width: 100%;
    font-family: var(--font-serif);
  }
  .content.loading-state {
    font-family: var(--font-ui);
  }
  .welcome {
    text-align:center; padding:80px 20px; color:var(--text-muted);
    font-family: var(--font-ui);
  }
  .welcome h2 { font-size:22px; color:var(--text-main); margin-bottom:8px; }
  .welcome p { font-size:14px; }
  .loading {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted); font-family: var(--font-ui); font-size: 14px;
  }

  /* ── Markdown 排版 ── */
  .content img { max-width: 100%; height: auto; border-radius: 4px; margin: 16px 0; }
  .content h1 {
    font-size: 28px; margin: 0 0 8px; font-weight: 600;
    line-height: 1.3; color: var(--text-main);
  }
  .content h2 {
    font-size: 20px; margin: 36px 0 12px; font-weight: 600;
    border-bottom: 1px solid var(--border); padding-bottom: 6px;
    color: var(--text-main);
  }
  .content h3 {
    font-size: 17px; margin: 24px 0 8px; font-weight: 600;
    color: var(--text-main);
  }
  .content h4 {
    font-size: 15px; margin: 20px 0 6px; font-weight: 600;
    color: var(--text-muted);
  }
  .content p { line-height: 1.75; margin: 0 0 14px; font-size: 16px; }
  .content a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(218,119,86,0.3); }
  .content a:hover { border-bottom-color: var(--accent); }
  .content blockquote {
    margin: 20px 0; padding: 12px 20px;
    border-left: 3px solid var(--accent);
    background: rgba(218,119,86,0.04);
    color: var(--text-muted); font-style: italic;
  }
  .content blockquote p { margin: 0; }
  .content ul, .content ol {
    padding-left: 24px; margin: 12px 0;
    line-height: 1.75; font-size: 16px;
  }
  .content li { margin-bottom: 4px; }
  .content li > ul, .content li > ol { margin: 4px 0; }
  .content code {
    font-family: var(--font-ui); font-size: 14px;
    background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 4px;
    color: var(--text-main);
  }
  .content pre {
    background: #242220; color: #f5f4ef; padding: 20px; border-radius: 8px;
    overflow-x: auto; margin: 24px 0; font-size: 14px; line-height: 1.6;
    font-family: var(--font-ui);
  }
  .content pre code {
    background: none; padding: 0; color: inherit; border-radius: 0;
  }
  .content table {
    border-collapse: collapse; width: 100%; margin: 32px 0;
    font-size: 14.5px; font-family: var(--font-ui);
    overflow-x: auto; display: block;
  }
  .content th, .content td {
    border: 1px solid var(--border); padding: 10px 14px;
    text-align: left; white-space: nowrap;
  }
  .content th {
    background: var(--bg-sidebar); font-weight: 600;
    color: var(--text-muted); font-size: 12px;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .content td { color: var(--text-main); font-size: 14px; }
  .content hr {
    margin: 36px 0; border: none; border-top: 1px solid var(--border);
  }
  .content strong { font-weight: 600; color: var(--text-main); }
  .content em { color: var(--text-muted); }
  .content .math { overflow-x: auto; }

  .comments-container {
    max-width: 740px; width: 100%; padding: 0 48px 80px;
  }

  /* ── 响应式 ── */
  @media (max-width: 900px) {
    .content { padding: 16px 20px 60px; max-width: 100%; }
    .comments-container { padding: 0 20px 60px; max-width: 100%; }
    .content h1 { font-size: 24px; }
    .content h2 { font-size: 18px; }
    .content p { font-size: 15px; }
    main .toolbar { padding: 12px 20px; }
  }
  @media (max-width: 700px) {
    body { flex-direction: column; }
    aside {
      position: fixed; top: 0; left: 0; bottom: 0;
      transform: translateX(-100%); width: 280px; min-width: 280px;
      box-shadow: 2px 0 24px rgba(0,0,0,0.15);
    }
    aside.open { transform: translateX(0); }
    .topbar { display: flex; }
    main .toolbar { display: none; }
    .content { padding: 20px 16px 60px; }
    .tree-toggle { padding: 10px 16px; }
    .file-link { margin: 2px 12px; }
  }
</style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside>
  <div class="sidebar-inner">
    <header>
      <h1>Equity Research</h1>
      <p id="file-count-line"><span id="file-count">0</span> 份研究报告</p>
    </header>
    <nav id="sidebar-nav"></nav>
  </div>
</aside>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- ── Mobile Top Bar ── -->
<div class="topbar">
  <button class="hamburger" id="hamburger">
    <span></span><span></span><span></span>
  </button>
  <div class="title" id="mobile-title">Equity Research</div>
</div>

<!-- ── Main Content ── -->
<main>
  <div class="toolbar" id="toolbar" style="display:none">
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>
  <div class="content welcome" id="content">
    <h2>Equity Research</h2>
    <p>选择左侧研究报告开始阅读</p>
    <p style="font-size:12px;margin-top:4px;">Buy-Side · Fundamental · Long-Term</p>
  </div>
  <div id="comments-container" class="comments-container"></div>
</main>

<script>
// ── Globals ──
const TREE = typeof TREE_DATA !== 'undefined' ? TREE_DATA : {};

// ── Count files ──
let total = 0;
for (const cat of Object.values(TREE))
  for (const group of Object.values(cat))
    total += Array.isArray(group) ? group.length : 0;
document.getElementById("file-count").textContent = total;

// ── localStorage ──
function storageKey(name) { return "eq-tree-" + encodeURIComponent(name); }

// ── Mobile sidebar ──
const aside = document.querySelector("aside");
const overlay = document.getElementById("sidebar-overlay");
const hamburger = document.getElementById("hamburger");

function closeSidebar() {
  aside.classList.remove("open");
  overlay.classList.remove("show");
}
hamburger.addEventListener("click", () => {
  aside.classList.toggle("open");
  overlay.classList.toggle("show");
});
overlay.addEventListener("click", closeSidebar);

// ── Build tree ──
const nav = document.getElementById("sidebar-nav");

function createTree() {
  if (Object.keys(TREE).length === 0) {
    nav.innerHTML = '<div style="padding:18px;font-size:13px;color:var(--text-muted);">暂无数据<br><small>请运行 python3 build_tree.py</small></div>';
    return;
  }

  Object.entries(TREE).forEach(([catName, catGroups]) => {
    const savedCat = localStorage.getItem(storageKey(catName));
    const catCollapsed = savedCat === null ? false : savedCat === "collapsed";

    const catToggle = document.createElement("button");
    catToggle.className = "tree-toggle" + (catCollapsed ? " collapsed" : "");
    catToggle.innerHTML = '<span class="arrow">▼</span>' + catName;
    catToggle.addEventListener("click", () => {
      catToggle.classList.toggle("collapsed");
      catChildren.classList.toggle("expanded");
      localStorage.setItem(storageKey(catName),
        catToggle.classList.contains("collapsed") ? "collapsed" : "expanded");
    });
    nav.appendChild(catToggle);

    const catChildren = document.createElement("div");
    catChildren.className = "tree-children" + (catCollapsed ? "" : " expanded");
    nav.appendChild(catChildren);

    Object.entries(catGroups).forEach(([groupName, files]) => {
      const grpKey = catName + "||" + groupName;
      const savedGrp = localStorage.getItem(storageKey(grpKey));
      const grpCollapsed = savedGrp === null ? false : savedGrp === "collapsed";

      const grpToggle = document.createElement("button");
      grpToggle.className = "tree-toggle" + (grpCollapsed ? " collapsed" : "");
      grpToggle.style.cssText = "padding-left:32px;";
      grpToggle.innerHTML = '<span class="arrow">▼</span>' + groupName;
      grpToggle.addEventListener("click", () => {
        grpToggle.classList.toggle("collapsed");
        grpChildren.classList.toggle("expanded");
        localStorage.setItem(storageKey(grpKey),
          grpToggle.classList.contains("collapsed") ? "collapsed" : "expanded");
      });
      catChildren.appendChild(grpToggle);

      const grpChildren = document.createElement("div");
      grpChildren.className = "tree-children" + (grpCollapsed ? "" : " expanded");
      catChildren.appendChild(grpChildren);

      files.forEach(f => {
        const a = document.createElement("a");
        a.className = "file-link";
        a.dataset.path = f.path;
        a.dataset.ticker = f.ticker || "";
        a.addEventListener("click", (e) => { e.preventDefault(); loadFile(a); closeSidebar(); });

        // Title + optional ticker badge
        const titleSpan = document.createElement("span");
        titleSpan.className = "title-part";
        titleSpan.textContent = f.title;
        a.appendChild(titleSpan);

        if (f.ticker) {
          const badge = document.createElement("span");
          badge.className = "ticker-badge";
          badge.textContent = f.ticker;
          a.appendChild(badge);
        }

        grpChildren.appendChild(a);
      });
    });
  });
}

createTree();

async function loadFile(el) {
  const content = document.getElementById("content");
  const toolbar = document.getElementById("toolbar");
  content.className = "content loading-state";
  content.innerHTML = '<div class="loading">加载中…</div>';

  document.querySelectorAll(".file-link").forEach(e => e.classList.remove("active"));
  el.classList.add("active");

  toolbar.style.display = "flex";
  document.getElementById("breadcrumb").innerHTML = el.dataset.path.replace(/\//g, " / ");

  const mTitle = document.getElementById("mobile-title");
  mTitle.textContent = el.querySelector(".title-part")?.textContent || "Equity Research";

  try {
    const resp = await fetch(el.dataset.path);
    if (!resp.ok) throw new Error("Not found");
    const md = await resp.text();
    content.className = "content";
    content.innerHTML = marked.parse(md);
    content.scrollTop = 0;
    window.scrollTo({ top: 0, behavior: "smooth" });

    // 加载评论区 (基于 Utterances)
    const commentsContainer = document.getElementById("comments-container");
    commentsContainer.innerHTML = "";
    const script = document.createElement("script");
    script.src = "https://utteranc.es/client.js";
    script.setAttribute("repo", "likeamaoooaa-spec/equity-research");
    script.setAttribute("issue-term", el.dataset.path);
    script.setAttribute("theme", "github-light");
    script.setAttribute("crossorigin", "anonymous");
    script.async = true;
    commentsContainer.appendChild(script);
  } catch (e) {
    content.className = "content welcome";
    content.innerHTML = `<h2>加载失败</h2><p style="color:#dc2626">${el.dataset.path}</p>`;
    document.getElementById("comments-container").innerHTML = "";
  }
}
</script>
</body>
</html>
