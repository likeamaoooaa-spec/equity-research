<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Equity Research</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="tree-data.js"></script>
<style>
  :root {
    --bg: #fafaf9; --card-bg: #fff; --border: #e7e5e4;
    --text: #1c1917; --text-muted: #78716c; --accent: #0ea5e9;
    --tag-bg: #f0f9ff; --tag-text: #0369a1;
    --sidebar-w: 340px; --topbar-h: 48px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; height: 100vh; overflow: hidden;
  }

  /* ── Sidebar ── */
  aside {
    width: var(--sidebar-w); min-width: var(--sidebar-w); z-index: 100;
    background: var(--card-bg); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
    transition: transform .3s ease;
  }
  aside .sidebar-inner { display:flex; flex-direction:column; overflow:hidden; flex:1; }
  aside header {
    padding: 14px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  aside header h1 { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
  aside header p { font-size: 11px; color: var(--text-muted); }
  aside nav { flex:1; overflow-y:auto; padding: 4px 0; -webkit-overflow-scrolling: touch; }

  /* ── Tree ── */
  .tree-toggle {
    display: flex; align-items: center; gap: 4px; width: 100%;
    padding: 6px 18px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .4px;
    color: var(--text-muted); cursor: pointer; user-select: none;
    border: none; background: none; text-align: left; transition: color .12s;
  }
  .tree-toggle:hover { color: var(--text); }
  .tree-toggle .arrow {
    display: inline-block; font-size: 10px; width: 12px;
    transition: transform .15s; flex-shrink: 0; line-height: 1;
  }
  .tree-toggle.collapsed .arrow { transform: rotate(-90deg); }
  .tree-children { overflow: hidden; max-height: 0; }
  .tree-children.expanded { max-height: 9999px; }

  .file-link {
    display: block; padding: 6px 18px 6px 32px;
    font-size: 13px; color: var(--text); text-decoration: none;
    border-left: 3px solid transparent; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: background .12s, border-color .12s; line-height: 1.4;
  }
  .file-link:hover { background: #f5f5f4; }
  .file-link.active {
    background: #f0f9ff; border-left-color: var(--accent);
    color: #0369a1; font-weight: 500;
  }
  .file-link .meta {
    display: block; font-size: 10px; color: var(--text-muted); font-weight: 400;
  }

  /* ── Overlay (mobile) ── */
  .sidebar-overlay {
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,.35); z-index: 99; display: none;
  }
  .sidebar-overlay.show { display: block; }

  /* ── Topbar (mobile) ── */
  .topbar {
    display: none; height: var(--topbar-h); min-height: var(--topbar-h);
    background: var(--card-bg); border-bottom: 1px solid var(--border);
    align-items: center; padding: 0 12px; gap: 10px; flex-shrink: 0;
  }
  .topbar .hamburger {
    background: none; border: none; cursor: pointer; padding: 4px;
    display: flex; flex-direction: column; gap: 3px; width: 24px;
  }
  .topbar .hamburger span {
    display: block; height: 2px; background: var(--text); border-radius: 2px; transition: .2s;
  }
  .topbar .title { font-size: 14px; font-weight: 600; flex: 1; }
  .topbar .tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; background: var(--tag-bg); color: var(--tag-text); display: none; }

  /* ── Main ── */
  main {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column;
    -webkit-overflow-scrolling: touch; min-width: 0;
  }
  main .toolbar {
    padding: 10px 28px; border-bottom: 1px solid var(--border);
    background: var(--card-bg); display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  main .toolbar .breadcrumb { font-size: 12px; color: var(--text-muted); }
  main .toolbar .tag-ticker {
    font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500;
    background: var(--tag-bg); color: var(--tag-text); display: none;
  }

  .content { padding: 28px 36px; max-width: 820px; flex:1; width: 100%; }
  .welcome { text-align:center; padding:80px 20px; color:var(--text-muted); }
  .welcome h2 { font-size:22px; color:var(--text); margin-bottom:8px; }
  .welcome p { font-size:14px; }

  /* ── Markdown Content ── */
  .content h1 { font-size:26px; margin:0 0 8px; font-weight:700; }
  .content h2 { font-size:19px; margin:28px 0 10px; font-weight:600; border-bottom:1px solid var(--border); padding-bottom:4px; }
  .content h3 { font-size:16px; margin:20px 0 8px; font-weight:600; }
  .content p { font-size:14.5px; line-height:1.75; margin:8px 0; }
  .content blockquote {
    border-left:3px solid var(--accent); padding:6px 16px; margin:12px 0;
    color:var(--text-muted); font-size:14px; background:#f8fafc; border-radius:0 6px 6px 0;
  }
  .content ul, .content ol { padding-left:22px; margin:8px 0; }
  .content li { font-size:14px; line-height:1.7; }
  .content code { background:#f1f5f9; padding:2px 6px; border-radius:4px; font-size:13px; }
  .content pre {
    background:#1e293b; color:#e2e8f0; padding:16px; border-radius:8px;
    overflow-x:auto; margin:12px 0; font-size:13px; line-height:1.5;
  }
  .content pre code { background:none; padding:0; color:inherit; }
  .content table {
    border-collapse:collapse; width:100%; margin:12px 0; font-size:13px;
    display:block; overflow-x:auto; -webkit-overflow-scrolling:touch;
  }
  .content th, .content td { border:1px solid var(--border); padding:6px 10px; text-align:left; white-space:nowrap; }
  .content th { background:#f8fafc; font-weight:600; }
  .content hr { border:none; border-top:1px solid var(--border); margin:20px 0; }
  .content a { color:var(--accent); }
  .content img { max-width:100%; height:auto; }
  .loading { color:var(--text-muted); font-size:14px; padding:40px; text-align:center; }

  /* ── Mobile (≤768px) ── */
  @media (max-width:768px) {
    body { flex-direction: column; }
    aside {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 300px; min-width: 300px; z-index: 100;
      transform: translateX(-100%);
      box-shadow: 2px 0 12px rgba(0,0,0,.15);
    }
    aside.open { transform: translateX(0); }
    .topbar { display: flex; }
    main .toolbar { display: none; }
    main .content { padding: 16px 18px; max-width: 100%; }
    .content h1 { font-size: 22px; }
    .content h2 { font-size: 17px; }
    .content h3 { font-size: 15px; }
    .content p, .content li { font-size: 14px; line-height: 1.7; }
    .content table { font-size: 12px; }
    .content th, .content td { padding: 4px 8px; }
    .content blockquote { font-size: 13px; padding: 6px 12px; }
  }
</style>
</head>
<body>

<!-- Mobile top bar -->
<div class="topbar" id="topbar">
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <span class="title" id="mobile-title">Equity Research</span>
  <span class="tag" id="mobile-tag"></span>
</div>

<!-- Sidebar overlay -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- Sidebar -->
<aside>
  <div class="sidebar-inner">
  <header>
    <h1>Equity Research</h1>
    <p>投资研究笔记 · <span id="file-count"></span> 篇</p>
  </header>
  <nav id="sidebar-nav"></nav>
  </div>
</aside>

<!-- Main content -->
<main>
  <div class="toolbar" id="toolbar">
    <span class="breadcrumb" id="breadcrumb"></span>
    <span class="tag tag-ticker" id="tag-ticker" style="display:none"></span>
  </div>
  <div class="content" id="content">
    <div class="welcome">
      <h2>投资研究笔记</h2>
      <p>点击左侧目录展开并选择一篇报告查看</p>
      <p style="margin-top:8px;"><small>新增文件后运行 <code>python3 build_tree.py</code> 即可自动更新导航</small></p>
    </div>
  </div>
</main>

<script>
// Use auto-generated TREE_DATA from tree-data.js
const TREE = typeof TREE_DATA !== 'undefined' ? TREE_DATA : {};

// ── Count files ──
let total = 0;
for (const cat of Object.values(TREE))
  for (const group of Object.values(cat))
    total += Array.isArray(group) ? group.length : 0;
document.getElementById("file-count").textContent = total;

// ── localStorage ──
function storageKey(name) { return "eq-tree-" + encodeURIComponent(name); }

// ── Mobile sidebar toggle ──
const aside = document.querySelector("aside");
const overlay = document.getElementById("sidebar-overlay");
const hamburger = document.getElementById("hamburger");

function closeSidebar() {
  aside.classList.remove("open");
  overlay.classList.remove("show");
}
hamburger.addEventListener("click", () => {
  aside.classList.toggle("open");
  overlay.classList.toggle("show");
});
overlay.addEventListener("click", closeSidebar);

// ── Build tree ──
const nav = document.getElementById("sidebar-nav");

function createTree() {
  if (Object.keys(TREE).length === 0) {
    nav.innerHTML = '<div style="padding:18px;font-size:13px;color:var(--text-muted);">暂无数据<br><small>请运行 python3 build_tree.py</small></div>';
    return;
  }

  Object.entries(TREE).forEach(([catName, catGroups]) => {
    const savedCat = localStorage.getItem(storageKey(catName));
    const catCollapsed = savedCat === null ? false : savedCat === "collapsed";

    const catToggle = document.createElement("button");
    catToggle.className = "tree-toggle" + (catCollapsed ? " collapsed" : "");
    catToggle.innerHTML = '<span class="arrow">▼</span>' + catName;
    catToggle.addEventListener("click", () => {
      catToggle.classList.toggle("collapsed");
      catChildren.classList.toggle("expanded");
      localStorage.setItem(storageKey(catName),
        catToggle.classList.contains("collapsed") ? "collapsed" : "expanded");
    });
    nav.appendChild(catToggle);

    const catChildren = document.createElement("div");
    catChildren.className = "tree-children" + (catCollapsed ? "" : " expanded");
    nav.appendChild(catChildren);

    Object.entries(catGroups).forEach(([groupName, files]) => {
      const grpKey = catName + "||" + groupName;
      const savedGrp = localStorage.getItem(storageKey(grpKey));
      const grpCollapsed = savedGrp === null ? false : savedGrp === "collapsed";

      const grpToggle = document.createElement("button");
      grpToggle.className = "tree-toggle" + (grpCollapsed ? " collapsed" : "");
      grpToggle.style.cssText = "padding-left:32px;";
      grpToggle.innerHTML = '<span class="arrow">▼</span>🏷 ' + groupName;
      grpToggle.addEventListener("click", () => {
        grpToggle.classList.toggle("collapsed");
        grpChildren.classList.toggle("expanded");
        localStorage.setItem(storageKey(grpKey),
          grpToggle.classList.contains("collapsed") ? "collapsed" : "expanded");
      });
      catChildren.appendChild(grpToggle);

      const grpChildren = document.createElement("div");
      grpChildren.className = "tree-children" + (grpCollapsed ? "" : " expanded");
      catChildren.appendChild(grpChildren);

      files.forEach(f => {
        const a = document.createElement("a");
        a.className = "file-link";
        a.innerHTML = `${f.title}<span class="meta">${f.date}</span>`;
        a.dataset.path = f.path;
        const ticker = f.ticker || "";
        a.dataset.ticker = ticker;
        a.addEventListener("click", (e) => { e.preventDefault(); loadFile(a); closeSidebar(); });
        grpChildren.appendChild(a);
      });
    });
  });
}

createTree();

async function loadFile(el) {
  const content = document.getElementById("content");
  const toolbar = document.getElementById("toolbar");
  content.innerHTML = '<div class="loading">加载中…</div>';

  document.querySelectorAll(".file-link").forEach(e => e.classList.remove("active"));
  el.classList.add("active");

  toolbar.style.display = "flex";
  document.getElementById("breadcrumb").innerHTML = el.dataset.path.replace(/\//g, " / ");

  const dTag = document.getElementById("tag-ticker");
  const mTag = document.getElementById("mobile-tag");
  const mTitle = document.getElementById("mobile-title");

  if (el.dataset.ticker && el.dataset.ticker !== "undefined") {
    dTag.style.display = "inline"; dTag.textContent = el.dataset.ticker;
    mTag.style.display = "inline"; mTag.textContent = el.dataset.ticker;
  } else {
    dTag.style.display = "none";
    mTag.style.display = "none";
  }
  mTitle.textContent = el.textContent.trim().split("\n")[0] || "Equity Research";

  try {
    const resp = await fetch(el.dataset.path);
    if (!resp.ok) throw new Error("Not found");
    content.innerHTML = marked.parse(await resp.text());
    content.scrollTop = 0;
    window.scrollTo({ top: 0, behavior: "smooth" });
  } catch (e) {
    content.innerHTML = `<div class="welcome"><p style="color:#dc2626">加载失败: ${el.dataset.path}</p></div>`;
  }
}
</script>
</body>
</html>
