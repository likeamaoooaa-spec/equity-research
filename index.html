<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equity Research</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #fafaf9;
    --card-bg: #ffffff;
    --border: #e7e5e4;
    --text: #1c1917;
    --text-muted: #78716c;
    --accent: #0ea5e9;
    --tag-bg: #f0f9ff;
    --tag-text: #0369a1;
    --tag-bg2: #fef3c7;
    --tag-text2: #92400e;
    --sidebar-w: 320px;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar */
  aside {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--card-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  aside header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  aside header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  aside header p {
    font-size: 12px;
    color: var(--text-muted);
  }
  aside nav {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--text-muted);
    padding: 12px 20px 6px;
  }
  .file-link {
    display: block;
    padding: 7px 20px;
    font-size: 13px;
    color: var(--text);
    text-decoration: none;
    border-left: 3px solid transparent;
    transition: background .12s, border-color .12s;
    cursor: pointer;
    line-height: 1.4;
  }
  .file-link:hover { background: #f5f5f4; }
  .file-link.active {
    background: #f0f9ff;
    border-left-color: var(--accent);
    color: #0369a1;
    font-weight: 500;
  }
  .file-link .meta {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* Main content */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    display: flex;
    flex-direction: column;
  }
  main .toolbar {
    padding: 12px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--card-bg);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  main .toolbar .breadcrumb {
    font-size: 13px;
    color: var(--text-muted);
  }
  main .toolbar .breadcrumb strong { color: var(--text); }
  main .toolbar .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 12px;
    font-weight: 500;
  }
  .tag-ticker { background: var(--tag-bg); color: var(--tag-text); }
  .tag-note  { background: var(--tag-bg2); color: var(--tag-text2); }

  .content {
    padding: 32px 40px;
    max-width: 820px;
    flex: 1;
  }
  .content .welcome {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .content .welcome h2 { font-size: 22px; color: var(--text); margin-bottom: 8px; }
  .content .welcome p { font-size: 14px; }

  /* Markdown rendered styles */
  .content h1 { font-size: 26px; margin: 0 0 8px; font-weight: 700; }
  .content h2 { font-size: 19px; margin: 28px 0 10px; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .content h3 { font-size: 16px; margin: 20px 0 8px; font-weight: 600; }
  .content p { font-size: 14.5px; line-height: 1.75; margin: 8px 0; }
  .content blockquote {
    border-left: 3px solid var(--accent);
    padding: 6px 16px;
    margin: 12px 0;
    color: var(--text-muted);
    font-size: 14px;
    background: #f8fafc;
    border-radius: 0 6px 6px 0;
  }
  .content ul, .content ol { padding-left: 22px; margin: 8px 0; }
  .content li { font-size: 14px; line-height: 1.7; }
  .content code {
    background: #f1f5f9;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }
  .content pre {
    background: #1e293b;
    color: #e2e8f0;
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 12px 0;
    font-size: 13px;
    line-height: 1.5;
  }
  .content pre code { background: none; padding: 0; color: inherit; }
  .content table {
    border-collapse: collapse;
    width: 100%;
    margin: 12px 0;
    font-size: 13px;
  }
  .content th, .content td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }
  .content th { background: #f8fafc; font-weight: 600; }
  .content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .content a { color: var(--accent); }
  .loading { color: var(--text-muted); font-size: 14px; padding: 40px; text-align: center; }

  @media (max-width: 700px) {
    body { flex-direction: column; }
    aside { width: 100%; min-width: 100%; max-height: 45vh; }
    main .content { padding: 20px; }
  }
</style>
</head>
<body>

<aside>
  <header>
    <h1>Equity Research</h1>
    <p>投资研究笔记 &middot; <span id="file-count"></span> 篇</p>
  </header>
  <nav id="sidebar-nav"></nav>
</aside>

<main>
  <div class="toolbar" id="toolbar" style="display:none">
    <span class="breadcrumb" id="breadcrumb"></span>
    <span class="tag tag-ticker" id="tag-ticker" style="display:none"></span>
    <span class="tag tag-note" id="tag-note" style="display:none"></span>
  </div>
  <div class="content" id="content">
    <div class="welcome">
      <h2>投资研究笔记</h2>
      <p>从左侧选择一篇报告查看</p>
    </div>
  </div>
</main>

<script>
const FILES = [
  { path: "research/PLTR/2026-07-11_PLTR_buyside-memo.md", title: "Palantir (PLTR) Buy-Side Memo", ticker: "PLTR", type: "research", date: "2026-07-11" },
  { path: "research/PLTR/2026-07-12_PLTR_chronicle.md", title: "Palantir 编年史 (2003–2026)", ticker: "PLTR", type: "research", date: "2026-07-12" },
  { path: "research/RKLB/2026-07-11_RKLB_buyside-memo.md", title: "Rocket Lab (RKLB) Buy-Side Memo", ticker: "RKLB", type: "research", date: "2026-07-11" },
  { path: "research/RKLB/2026-07-12_RKLB_corporate-chronicle.md", title: "RKLB 公司编年史", ticker: "RKLB", type: "research", date: "2026-07-12" },
  { path: "research/RKLB/2026-07-12_RKLB_investment-audit.md", title: "RKLB 买入持有投资审计", ticker: "RKLB", type: "research", date: "2026-07-12" },
  { path: "research/RKLB/2026-07-12_Peter-Beck_biography.md", title: "彼得·贝克传", ticker: "RKLB", type: "research", date: "2026-07-12" },
  { path: "notes/2026-07-11_space-economy-moat.md", title: "太空经济价值链护城河分析", ticker: null, type: "note", date: "2026-07-11" },
  { path: "notes/2026-07-12_space-economy-deep-research.md", title: "太空经济上市企业深度产业链研究", ticker: null, type: "note", date: "2026-07-12" },
  { path: "notes/2026-07-12_space-economy-vision.md", title: "太空经济成熟后的世界：一个设想", ticker: null, type: "note", date: "2026-07-12" },
  { path: "notes/2026-07-12_space-industry-investment-report.md", title: "全球太空产业投研报告", ticker: null, type: "note", date: "2026-07-12" },
];

document.getElementById("file-count").textContent = FILES.length;

// Build sidebar
const nav = document.getElementById("sidebar-nav");
const groups = { research: "Research · 个股研究", note: "Notes · 行业笔记" };
for (const [type, label] of Object.entries(groups)) {
  const section = document.createElement("div");
  section.className = "section-title";
  section.textContent = label;
  nav.appendChild(section);
  FILES.filter(f => f.type === type).forEach((f, i) => {
    const a = document.createElement("a");
    a.className = "file-link";
    a.innerHTML = `${f.title}<span class="meta">${f.date}${f.ticker ? ' · ' + f.ticker : ''}</span>`;
    a.dataset.path = f.path;
    a.addEventListener("click", (e) => { e.preventDefault(); loadFile(f); });
    nav.appendChild(a);
  });
}

// Also render RKLB HTML directly
(function() {
  const section = document.createElement("div");
  section.className = "section-title";
  section.textContent = "HTML · 直接查看";
  nav.appendChild(section);
  const a = document.createElement("a");
  a.className = "file-link";
  a.innerHTML = 'RKLB Buy-Side Memo (HTML)<span class="meta">2026-07-11 · RKLB</span>';
  a.href = "research/RKLB/2026-07-11_RKLB_buyside-memo.html";
  a.target = "_blank";
  nav.appendChild(a);
})();

async function loadFile(file) {
  const content = document.getElementById("content");
  const toolbar = document.getElementById("toolbar");
  content.innerHTML = '<div class="loading">加载中…</div>';

  // Highlight active
  document.querySelectorAll(".file-link").forEach(el => el.classList.remove("active"));
  document.querySelector(`[data-path="${file.path}"]`)?.classList.add("active");

  toolbar.style.display = "flex";
  document.getElementById("breadcrumb").innerHTML = file.path.replace(/\//g, " / ");
  const tagTicker = document.getElementById("tag-ticker");
  const tagNote = document.getElementById("tag-note");
  if (file.ticker) {
    tagTicker.style.display = "inline";
    tagTicker.textContent = file.ticker;
    tagNote.style.display = "none";
  } else {
    tagTicker.style.display = "none";
    tagNote.style.display = "inline";
    tagNote.textContent = "笔记";
  }

  try {
    const resp = await fetch(file.path);
    if (!resp.ok) throw new Error("Not found");
    const md = await resp.text();
    const html = marked.parse(md);
    content.innerHTML = html;
  } catch (e) {
    content.innerHTML = `<div class="welcome"><p style="color:#dc2626">加载失败: ${file.path}</p></div>`;
  }
}
</script>
</body>
</html>
